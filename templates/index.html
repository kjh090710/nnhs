<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 선도 관리 시스템</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="background-shape shape1"></div>
  <div class="background-shape shape2"></div>

  <div class="container">
    <header class="hero">
      <div>
        <p class="badge">Student Council System</p>
        <h1>학생 선도 관리 시스템</h1>
        <p class="subtitle">
          학번으로 학생을 조회하고 선도 내용을 입력하면 자동으로 저장됩니다.
          아래 목록에서는 학번순으로 정렬된 학생의 선도 횟수를 확인할 수 있습니다.
        </p>
      </div>
    </header>

    <section class="card">
      <h2>학생 명단 엑셀 업로드</h2>
      <p class="upload-guide">
        첫 행에 <strong>학년</strong>, <strong>반</strong>, <strong>번호</strong>, <strong>이름</strong> 열이 있는 .xlsx 파일을 업로드하세요.
        <br>
        예: 2학년 2반 1번 → <strong>20201</strong>
      </p>

      <div class="form-row">
        <input type="file" id="excelFile" accept=".xlsx">
        <button class="primary-btn" onclick="uploadExcel()">엑셀 업로드</button>
      </div>

      <div id="uploadMessage" class="message-box hidden"></div>
    </section>

    <section class="card">
      <h2>학생 검색</h2>
      <div class="form-row">
        <input type="text" id="studentNumber" placeholder="학번 입력 예: 20201">
        <button class="primary-btn" onclick="searchStudent()">학생 검색</button>
      </div>
      <div id="studentInfo" class="info-box hidden"></div>
    </section>

    <section class="card">
      <h2>선도 내용 입력</h2>
      <div class="form-grid one-column">
        <input type="text" id="content" placeholder="선도 내용 입력 예: 복장 규정 위반 지도">
      </div>
      <div class="button-row">
        <button class="primary-btn" onclick="saveGuidance()">선도 내용 저장</button>
      </div>
      <div id="message" class="message-box hidden"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>학생별 선도 현황</h2>
        <button class="secondary-btn" onclick="loadGuidanceSummary()">새로고침</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>학번</th>
              <th>이름</th>
              <th>선도 횟수</th>
              <th>상세</th>
            </tr>
          </thead>
          <tbody id="summaryTableBody">
            <tr>
              <td colspan="4">학생별 선도 현황을 불러오는 중입니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
